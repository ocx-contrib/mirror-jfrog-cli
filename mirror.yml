name: jfrog-cli
target:
  registry: ocx.sh
  repository: jfrog-cli

source:
  type: url_index
  generator:
    command: ["uv", "run", "generate.py"]
    timeout_seconds: 240

# generate.py flattens each JFrog platform directory + binary into a single
# asset filename: "<platform-dir>-<binary>" (e.g. jfrog-cli-linux-amd64-jf).
# JFrog's macOS Intel build lives under "mac-386" — that directory is the
# amd64 (Intel) binary, not a 32-bit build, so it maps to darwin/amd64.
# Linux + darwin enabled. windows staged below for a later pass.
assets:
  linux/amd64:
    - "^jfrog-cli-linux-amd64-jf$"
  linux/arm64:
    - "^jfrog-cli-linux-arm64-jf$"
  darwin/amd64:
    - "^jfrog-cli-mac-386-jf$"
  darwin/arm64:
    - "^jfrog-cli-mac-arm64-jf$"
#  windows/amd64:
#    - "^jfrog-cli-windows-amd64-jf\\.exe$"

# Raw binaries (no archive). The pipeline drops the binary into the content
# root under `name`; on Windows `.exe` is auto-appended from the asset name.
asset_type:
  type: binary
  name: jf

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "2.100.0"
  new_per_run: 5
  poll_interval: "0 */6 * * *"

concurrency:
  max_downloads: 4
  max_bundles: 2
  max_pushes: 2
  rate_limit_ms: 200
  max_retries: 3
  compression_threads: 0

tests:
  - name: smoke
    script: tests/smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm
  darwin/amd64:
    # Intel slice tested on the arm64 macos-14 runner via Rosetta 2 (GitHub's
    # macos-13 Intel pool is exhausted and deadlocks the push job).
    runner: macos-14
  darwin/arm64:
    runner: macos-14
#  windows/amd64:
#    runner: windows-latest
#    shell: pwsh

notify:
  discord:
    webhook_secret: OCX_MIRROR_DISCORD_HOOK
